name: Remove Case Duplicate Files

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  remove-duplicates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Find and remove case duplicates
        run: |
          # Get all files and find case duplicates
          git ls-tree -r HEAD --name-only > all_files.txt

          # Find duplicates (files that differ only by case)
          python3 << 'PYTHON'
          from collections import defaultdict

          with open('all_files.txt') as f:
              files = [line.strip() for line in f if line.strip()]

          # Group by lowercase
          groups = defaultdict(list)
          for f in files:
              groups[f.lower()].append(f)

          # Find duplicates and decide which to remove
          to_remove = []
          for lower_path, variants in groups.items():
              if len(variants) > 1:
                  # Keep the lowercase version
                  keep = lower_path
                  for v in variants:
                      if v.lower() == v:
                          keep = v
                          break
                  for v in variants:
                      if v != keep:
                          to_remove.append(v)
                          print(f"Will remove: {v} (keeping: {keep})")

          with open('files_to_remove.txt', 'w') as f:
              for path in to_remove:
                  f.write(path + '\n')

          print(f"\nTotal files to remove: {len(to_remove)}")
          PYTHON

      - name: Remove duplicate files from Git
        run: |
          if [ -s files_to_remove.txt ]; then
            while IFS= read -r file; do
              echo "Removing: $file"
              git rm --cached "$file" || true
            done < files_to_remove.txt
          else
            echo "No duplicate files to remove"
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "fix: remove case-duplicate files from Git index"
            git push
          fi
