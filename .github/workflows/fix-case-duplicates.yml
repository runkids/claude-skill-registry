name: Fix Case Duplicates

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fix case-insensitive duplicates
        run: |
          python3 << 'PYTHON'
          import sys
          import hashlib
          import subprocess
          from collections import defaultdict
          from pathlib import Path

          def file_hash(path):
              """计算文件 MD5"""
              try:
                  return hashlib.md5(Path(path).read_bytes()).hexdigest()
              except:
                  return None

          def run_git(*args):
              subprocess.run(['git'] + list(args), check=True)

          # 获取所有文件
          result = subprocess.run(['git', 'ls-tree', '-r', 'HEAD', '--name-only'],
                                  capture_output=True, text=True)
          files = [f.strip() for f in result.stdout.strip().split('\n') if f.strip()]

          # 按小写路径分组
          groups = defaultdict(list)
          for f in files:
              groups[f.lower()].append(f)

          # 找出重复的
          duplicates = {k: v for k, v in groups.items() if len(v) > 1}

          if not duplicates:
              print("✅ 没有发现大小写重复的文件")
              sys.exit(0)

          print(f"发现 {len(duplicates)} 组大小写重复的文件\n")

          removed = []
          renamed = []

          for lower_path, variants in sorted(duplicates.items()):
              hashes = {v: file_hash(v) for v in variants}
              unique_hashes = set(h for h in hashes.values() if h)

              # 确定保留哪个版本（优先小写）
              keep = None
              for v in variants:
                  if v.lower() == v:
                      keep = v
                      break
              if not keep:
                  keep = min(variants)  # 如果没有纯小写，保留字典序最小的

              if len(unique_hashes) == 1:
                  # 内容相同：删除其他版本
                  print(f"📁 {lower_path} - 内容相同")
                  print(f"   保留: {keep}")
                  for v in variants:
                      if v != keep:
                          print(f"   删除: {v}")
                          run_git('rm', v)
                          removed.append(v)
              else:
                  # 内容不同：重命名其他版本
                  print(f"📁 {lower_path} - 内容不同!")
                  print(f"   保留: {keep}")

                  # 按 hash 分组，相同内容的只保留一个
                  hash_to_files = defaultdict(list)
                  for v in variants:
                      hash_to_files[hashes[v]].append(v)

                  suffix_counter = 2
                  keep_hash = hashes[keep]

                  for h, files_with_hash in hash_to_files.items():
                      if h == keep_hash:
                          # 与保留版本相同的，删除
                          for v in files_with_hash:
                              if v != keep:
                                  print(f"   删除(内容同keep): {v}")
                                  run_git('rm', v)
                                  removed.append(v)
                      else:
                          # 内容不同的，保留第一个并重命名，删除其他
                          first = files_with_hash[0]
                          # 生成新名称
                          p = Path(first)
                          new_name = f"{p.stem}-v{suffix_counter}{p.suffix}"
                          new_path = str(p.parent / new_name)
                          suffix_counter += 1

                          print(f"   重命名: {first} -> {new_path}")
                          run_git('mv', first, new_path)
                          renamed.append((first, new_path))

                          # 删除同 hash 的其他文件
                          for v in files_with_hash[1:]:
                              print(f"   删除(内容重复): {v}")
                              run_git('rm', v)
                              removed.append(v)
              print()

          print("=" * 50)
          print(f"删除: {len(removed)} 个文件")
          print(f"重命名: {len(renamed)} 个文件")
          PYTHON

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "fix: resolve case-duplicate files

          - 内容相同的重复文件：删除非小写版本
          - 内容不同的重复文件：重命名为 -v2 后缀"
            git push
          fi
