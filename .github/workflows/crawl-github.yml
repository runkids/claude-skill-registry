name: Crawl GitHub for Skills

on:
  schedule:
    # Run weekly on Wednesday at 03:00 UTC
    - cron: '0 3 * * 3'
  workflow_dispatch:
    inputs:
      max_skills:
        description: 'Maximum skills to crawl'
        required: false
        default: '10000'
      min_stars:
        description: 'Minimum stars filter'
        required: false
        default: '0'

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests pyyaml

      - name: Crawl GitHub for SKILL.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/crawl_github.py \
            --output sources/crawled.json \
            --max ${{ github.event.inputs.max_skills || '10000' }} \
            --min-stars ${{ github.event.inputs.min_stars || '0' }}

      - name: Download new skills
        run: |
          python scripts/download_sources.py

      - name: Build Registry
        run: python scripts/rebuild_registry.py

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "feat: Crawl skills from GitHub $(date -u +%Y-%m-%d)"
            git push
          fi
