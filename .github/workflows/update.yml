name: Update Registry

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'sources/**'
      - 'scripts/**'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml aiohttp requests

      - name: Count skills before update
        id: before
        run: |
          if [ -f "registry.json" ]; then
            COUNT=$(python3 -c "import json; print(json.load(open('registry.json')).get('total_count', 0))")
          else
            COUNT=0
          fi
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "📊 Skills before: $COUNT"

      - name: Discover new skills from GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🔍 Discovering new skills via GitHub API..."
          python scripts/discover_by_topic.py --output skills/data --json sources/discovered.json 2>&1 | tee discover.log

          if [ -f "sources/discovered.json" ]; then
            DISCOVERED=$(python3 -c "import json; d=json.load(open('sources/discovered.json')); print(d.get('total_skills', 0))")
            echo "✨ Discovered: $DISCOVERED new skill files"
          fi

      - name: Download skills from registry
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "⬇️ Downloading skills from existing registry..."
          python scripts/sync_and_download.py --download-only 2>&1 | tee download.log

      - name: Rebuild Registry from all skills
        run: |
          echo "🔄 Rebuilding registry from skills/data/..."
          python scripts/rebuild_registry.py

      - name: Count skills after update
        id: after
        run: |
          COUNT=$(python3 -c "import json; print(json.load(open('registry.json')).get('total_count', 0))")
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "📊 Skills after: $COUNT"

      - name: Generate update summary
        id: summary
        run: |
          BEFORE=${{ steps.before.outputs.count }}
          AFTER=${{ steps.after.outputs.count }}
          NEW=$((AFTER - BEFORE))
          DATE=$(date -u +%Y-%m-%d)

          echo ""
          echo "═══════════════════════════════════════"
          echo "📊 Daily Update Summary - $DATE"
          echo "═══════════════════════════════════════"
          echo "  Before:   $BEFORE skills"
          echo "  After:    $AFTER skills"
          echo "  New:      +$NEW skills"
          echo "═══════════════════════════════════════"

          # Update CHANGELOG.md
          if [ ! -f "CHANGELOG.md" ]; then
            echo "# Skill Registry Changelog" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            echo "Daily update log for skill discoveries." >> CHANGELOG.md
            echo "" >> CHANGELOG.md
          fi

          # Prepend new entry (keep recent 60 days)
          {
            echo "## $DATE"
            echo "- **Total**: $AFTER skills"
            echo "- **New**: +$NEW skills"
            echo ""
            head -n 300 CHANGELOG.md 2>/dev/null | tail -n +5
          } > CHANGELOG.tmp

          echo "# Skill Registry Changelog" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "Daily update log for skill discoveries." >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          cat CHANGELOG.tmp >> CHANGELOG.md
          rm -f CHANGELOG.tmp

          echo "new_count=$NEW" >> $GITHUB_OUTPUT

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A

          if git diff --staged --quiet; then
            echo "✅ No changes to commit"
          else
            BEFORE=${{ steps.before.outputs.count }}
            AFTER=${{ steps.after.outputs.count }}
            NEW=$((AFTER - BEFORE))
            DATE=$(date -u +%Y-%m-%d)

            if [ $NEW -gt 0 ]; then
              MSG="feat: Discover $NEW new skills ($DATE) - total: $AFTER"
            elif [ $NEW -lt 0 ]; then
              MSG="chore: Clean up registry ($DATE) - total: $AFTER"
            else
              MSG="chore: Update registry ($DATE) - total: $AFTER"
            fi

            git commit -m "$MSG"
            git push
            echo "✅ Pushed: $MSG"
          fi
