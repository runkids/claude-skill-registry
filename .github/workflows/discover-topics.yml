name: Discover Skills by GitHub Topics

on:
  schedule:
    # Run twice a week (Monday and Thursday at 04:00 UTC)
    - cron: '0 4 * * 1,4'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests aiohttp pyyaml

      - name: Discover skills by GitHub topics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/discover_by_topic.py --json sources/discovered.json

      - name: Download skills (sources + registry)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/download_v2.py

      - name: Build Registry
        run: python scripts/rebuild_registry.py

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A registry.json categories skills/data sources/discovered.json CHANGELOG.md
          if git diff --staged --quiet; then
            echo "No new skills discovered"
          else
            NEW_COUNT=$(git status --porcelain | grep -c "^??" || echo "0")
            git commit -m "feat: Discover ${NEW_COUNT} new skills via GitHub Topics $(date -u +%Y-%m-%d)"

            git fetch origin main
            git rebase -X theirs origin/main || {
              git rebase --abort
              git pull -X theirs --no-rebase origin main
            }
            git push
          fi
