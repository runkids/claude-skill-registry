name: Discover Skills by GitHub Topics

on:
  schedule:
    # Run twice a week (Monday and Thursday at 04:00 UTC)
    - cron: '0 4 * * 1,4'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Discover skills by GitHub topics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/discover_by_topic.py \
            --output skills \
            --json sources/discovered.json

      - name: Build Registry
        run: python scripts/build_registry.py

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          if git diff --staged --quiet; then
            echo "No new skills discovered"
          else
            NEW_COUNT=$(git status --porcelain | grep -c "^??" || echo "0")
            git commit -m "feat: Discover ${NEW_COUNT} new skills via GitHub Topics $(date -u +%Y-%m-%d)"
            git push
          fi
