name: Rebuild Main Search Index (Manual)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Ensure merged archive exists
        run: |
          if [ ! -d "skills" ]; then
            echo "skills/ directory missing. Run publish-from-core first."
            exit 1
          fi

      - name: Build search index from merged artifact
        run: |
          python scripts/build_search_index.py --skills-dir skills --registry registry.json --output docs
          echo "stats.json:"
          cat docs/stats.json
