<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Skills Registry - Search 67,000+ Skills</title>
    <meta name="description" content="Search and discover Claude Code skills. Browse 67,000+ skills for Claude Code, Codex CLI, and ChatGPT.">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <span class="logo-icon">🎯</span>
                <h1>Claude Skills Registry</h1>
            </div>
            <p class="tagline">Search <span id="total-count">67,000+</span> skills for Claude Code</p>
        </header>

        <!-- Search Box -->
        <div class="search-container">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input
                    type="text"
                    id="search-input"
                    placeholder="Search skills... (e.g., typescript, testing, pdf)"
                    autocomplete="off"
                    autofocus
                >
                <kbd class="search-hint">Enter</kbd>
            </div>

            <!-- Filters -->
            <div class="filters">
                <select id="category-filter">
                    <option value="">All Categories</option>
                </select>
                <select id="sort-filter">
                    <option value="relevance">Relevance</option>
                    <option value="stars">Most Stars</option>
                    <option value="name">Name A-Z</option>
                </select>
            </div>
        </div>

        <!-- Quick Tags -->
        <div class="quick-tags" id="quick-tags">
            <span class="tag" data-query="typescript">typescript</span>
            <span class="tag" data-query="react">react</span>
            <span class="tag" data-query="python">python</span>
            <span class="tag" data-query="testing">testing</span>
            <span class="tag" data-query="api">api</span>
            <span class="tag" data-query="database">database</span>
            <span class="tag" data-query="security">security</span>
            <span class="tag" data-query="docker">docker</span>
        </div>

        <!-- Stats Bar -->
        <div class="stats-bar" id="stats-bar">
            <span id="result-count"></span>
            <span id="search-time"></span>
        </div>

        <!-- Results -->
        <div class="results" id="results">
            <!-- Loading state -->
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Loading skills index...</p>
            </div>

            <!-- Featured skills (shown by default) -->
            <div id="featured-section" class="featured-section hidden">
                <h2>⭐ Featured Skills</h2>
                <div id="featured-list" class="skill-grid"></div>
            </div>

            <!-- Search results -->
            <div id="search-results" class="skill-list hidden"></div>

            <!-- Empty state -->
            <div id="empty-state" class="empty-state hidden">
                <span class="empty-icon">🔍</span>
                <h3>No skills found</h3>
                <p>Try different keywords or browse by category</p>
            </div>
        </div>

        <!-- Load More -->
        <div class="load-more hidden" id="load-more">
            <button id="load-more-btn">Load More</button>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <div class="footer-links">
                <a href="https://github.com/majiayu000/claude-skill-registry" target="_blank">
                    GitHub
                </a>
                <span class="divider">•</span>
                <a href="https://github.com/majiayu000/caude-skill-manager" target="_blank">
                    CLI Tool (sk)
                </a>
            </div>
            <p class="footer-note">
                Open source • Updated daily • <span id="last-updated"></span>
            </p>
        </footer>
    </div>

    <!-- Skill Detail Modal -->
    <div class="modal hidden" id="skill-modal">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <button class="modal-close" id="modal-close">&times;</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
